<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTracker — Контроль запчастин</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-car"></i> AutoTracker</h1>
        
        <div class="form-card">
            <h3 id="form-title">Додати запчастину</h3>
            <input type="hidden" id="part-id">
            <div class="input-group">
                <input type="text" id="part-name" placeholder="Назва (напр., Масло двигуна)">
            </div>
            <div class="input-group">
                <input type="number" id="part-current" placeholder="Поточний пробіг (км)">
            </div>
            <div class="input-group">
                <input type="number" id="part-max" placeholder="Ресурс (через скільки км заміна)">
            </div>
            <button id="save-btn" onclick="savePart()">Зберегти</button>
            <button id="cancel-btn" onclick="resetForm()" style="display: none; background: #555; margin-top: 5px;">Скасувати</button>
        </div>

        <h2><i class="fas fa-tools"></i> Контроль запчастин</h2>
        <div id="parts-list">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
