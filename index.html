<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АвтоТрекер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- БІЧНЕ МЕНЮ (ГАРАЖ) -->
    <div id="side-menu" class="sidebar">
        <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <h2 style="margin: 0; font-size: 20px; color: white;">Мій Гараж 🚗</h2>
            <button id="close-sidebar" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">&times;</button>
        </div>
        <div id="cars-list" style="padding: 0 15px;"></div>
        <hr style="border-color: #29292e; margin: 20px 0;">
        <div style="padding: 0 15px;">
            <h3 style="margin-top: 0; color: #c4c4cc;">Додати автомобіль</h3>
            <div class="to-form" style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="new-car-name-input" placeholder="Марка авто (напр., Passat B5+)" style="padding: 10px; border-radius: 6px; border: 1px solid #3a3a44; background: #121214; color: white;">
                <button id="add-new-car-btn" style="background-color: #74c69d; color: #121214; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer;">Додати в гараж</button>
            </div>
        </div>
    </div>

    <!-- ГОЛОВНИЙ КОНТЕЙНЕР ДОДАТКУ -->
    <div class="app-container" style="max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box;">
        
        <!-- ШАПКА САЙТУ -->
        <header class="main-header" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding: 5px 0;">
            <button id="open-sidebar-btn" class="burger-menu-btn" style="background: none; border: none; color: white; font-size: 24px; cursor: pointer;">☰</button>
            <div class="car-title-block" style="display: flex; align-items: center; gap: 8px;">
                <h1 id="car-name-display" style="margin: 0; font-size: 22px;">Моє Авто</h1>
                <button id="edit-car-name-btn" class="mini-edit-btn" style="background: none; border: none; font-size: 16px; cursor: pointer;">✏️</button>
            </div>
            <div style="width: 30px;"></div> <!-- Буфер для точного центрування -->
        </header>

        <hr style="border-color: #29292e; margin-bottom: 20px;">

        <!-- СЕКЦІЯ: ОНОВЛЕННЯ ПРОБІГУ -->
        <section class="odometer-section" style="background: #1e1e24; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2d2d35;">
            <h2 style="margin: 0 0 12px 0; font-size: 17px; font-weight: normal; color: white;">
                Поточний пробіг: <strong id="current-mileage" style="color: #4ea8de; font-size: 20px;">0</strong> км
            </h2>
            <div class="mileage-input-group" style="display: flex; gap: 10px;">
                <input type="number" id="mileage-input" placeholder="Введіть новий пробіг" style="flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #3a3a44; background: #121214; color: white;">
                <button id="update-mileage-btn" style="background-color: #3a86ff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;">Оновити</button>
            </div>
        </section>

        <!-- СЕКЦІЯ: ТАБЛИЦЯ ПОТОЧНОГО СТАНУ ТО -->
        <section class="info-section" style="background: #1e1e24; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2d2d35;">
            <h3 style="margin: 0 0 12px 0; font-size: 18px; color: #74c69d;">Технічне обслуговування</h3>
            
            <div class="info-card" style="background: #ffffff; color: #121214; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 15px; line-height: 1.6; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                <p style="margin: 4px 0;"><strong>Пробіг на ТО:</strong> <span id="last-to-mileage">—</span> км</p>
                <p style="margin: 4px 0;"><strong>Мастило:</strong> <span id="last-to-oil">—</span></p>
                <p style="margin: 4px 0;"><strong>Фільтр салону:</strong> <span id="last-to-cabin">—</span></p>
                <p style="margin: 4px 0;"><strong>Повітряний фільтр:</strong> <span id="last-to-air">—</span></p>
            </div>

            <button id="open-history-btn" style="background-color: #52b788; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold;">📋 Історія ТО</button>
        </section>

        <!-- СЕКЦІЯ: ЗАПИСАТИ НОВЕ ТО -->
        <section class="form-section" style="background: #1e1e24; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2d2d35;">
            <h3 style="margin: 0 0 12px 0; font-size: 17px; color: white;">Записати нове ТО</h3>
            <div class="to-form" style="display: flex; flex-direction: column; gap: 12px;">
                <input type="number" id="to-mileage-input" placeholder="Пробіг на момент ТО (км)" style="padding: 10px; border-radius: 6px; border: 1px solid #3a3a44; background: #121214; color: white;">
                <input type="text" id="to-oil-input" placeholder="Яке мастило залили?" style="padding: 10px; border-radius: 6px; border: 1px solid #3a3a44; background: #121214; color: white;">
                
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 15px; color: #c4c4cc;">
                    <input type="checkbox" id="to-cabin-checkbox" style="width: 18px; height: 18px;"> Заміна фільтра салону
                </label>
                
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 15px; color: #c4c4cc;">
                    <input type="checkbox" id="to-air-checkbox" style="width: 18px; height: 18px;"> Заміна повітряного фільтра
                </label>
                
                <button id="save-to-btn" style="background-color: #4ea8de; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold;">Зберегти дані ТО</button>
            </div>
        </section>

        <!-- СЕКЦІЯ: КОНТРОЛЬ ЗАПЧАСТИН (ОКРЕМІ КНОПКИ) -->
        <section class="parts-section" style="background: #1e1e24; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #2d2d35;">
            <h3 style="margin: 0 0 15px 0; font-size: 18px; color: #74c69d; text-align: center;">Контроль запчастин</h3>
            
            <div style="display: flex; gap: 10px;">
                <button id="open-add-part-modal-btn" style="flex: 1; background-color: #3a86ff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;">
                    <span style="font-size: 18px;">🔧</span> Заміна деталі
                </button>
                <button id="open-parts-history-modal-btn" style="flex: 1; background-color: #6247aa; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;">
                    <span style="font-size: 18px;">📊</span> Історія заміни деталей
                </button>
            </div>
        </section>

    </div>

    <!-- ========================================== -->
    <!-- МОДАЛЬНІ ВІКНА (СХОВИЩА ДЛЯ Окремих Кнопок) -->
    <!-- ========================================== -->

    <!-- ВІКНО 1: ІСТОРІЯ ТЕХНІЧНОГО ОБСЛУГОВУВАННЯ -->
    <div id="history-modal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; padding:15px; box-sizing:border-box;">
        <div class="modal-content" style="background: #1e1e24; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; border: 1px solid #3a3a44;">
            <h3 style="color: #74c69d; margin-top: 0;">📜 Історія обслуговування</h3>
            <div id="history-list" style="margin: 15px 0;"></div>
            <button id="close-history-modal" style="background: #3a3a44; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold;">Закрити</button>
        </div>
    </div>

    <!-- ВІКНО 2: ФОРМА ДОДАВАННЯ ДЕТАЛІ -->
    <div id="add-part-modal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; padding:15px; box-sizing:border-box;">
        <div class="modal-content" style="background: #1e1e24; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; border: 1px solid #3a3a44;">
            <h3 style="color: #4ea8de; margin-top: 0;">🔧 Додати заміну деталі</h3>
            <div class="to-form" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px;">
                <input type="text" id="part-name-input" placeholder="Назва деталі (напр., ГРМ)">
                <input type="number" id="part-replaced-mileage" placeholder="Пробіг заміни (км)">
                <input type="number" id="part-resource-input" placeholder="Ресурс деталі (км)">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="add-part-btn" style="flex: 1; background-color: #74c69d; color: #121214; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;">Зберегти</button>
                <button id="close-add-part-modal" style="flex: 1; background: #3a3a44; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">Скасувати</button>
            </div>
        </div>
    </div>

    <!-- ВІКНО 3: ІСТОРІЯ/СТАН ЗАПЧАСТИН -->
    <div id="parts-history-modal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; padding:15px; box-sizing:border-box;">
        <div class="modal-content" style="background: #1e1e24; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; border: 1px solid #3a3a44;">
            <h3 style="color: #6247aa; margin-top: 0;">📊 Стан та ресурс запчастин</h3>
            <div id="parts-list" style="margin: 15px 0;"></div>
            <button id="close-parts-history-modal" style="background: #3a3a44; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold;">Закрити</button>
        </div>
    </div>

    <!-- ВІКНО 4: РЕДАГУВАННЯ НАЗВИ АВТО -->
    <div id="edit-name-modal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center; padding:15px; box-sizing:border-box;">
        <div class="modal-content" style="background: #1e1e24; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #3a3a44;">
            <h3 style="color: white; margin-top: 0;">Змінити назву авто</h3>
            <input type="text" id="car-name-input" placeholder="Введіть нову назву авто" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #3a3a44; background: #121214; color: white; box-sizing: border-box; margin-bottom: 15px;">
            <div style="display: flex; gap: 10px;">
                <button id="save-car-btn" style="flex: 1; background-color: #4ea8de; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer;">Зберегти</button>
                <button id="close-edit-name-modal" style="flex: 1; background: #3a3a44; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">Скасувати</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
